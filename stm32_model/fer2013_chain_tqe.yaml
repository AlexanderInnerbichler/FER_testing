general:
  project_name: fer2013_emotion
  logs_dir: logs
  saved_models_dir: saved_models
  display_figures: False
  global_seed: 127
  gpu_memory_limit: 8

operation_mode: chain_tqe

model:
  model_name: mobilenetv2_a035
  input_shape: (128, 128, 3)
  pretrained: True

dataset:
  dataset_name: custom_dataset
  class_names: [angry, disgust, fear, happy, neutral, sad, surprise]
  training_path: ./datasets/fer2013/train
  test_path: ./datasets/fer2013/test
  validation_split: 0.2
  quantization_split: 0.3

preprocessing:
  rescaling:
    scale: 1/127.5
    offset: -1
  resizing:
    aspect_ratio: fit
    interpolation: nearest
  color_mode: rgb

data_augmentation:
  random_contrast:
    factor: 0.3
  random_brightness:
    factor: 0.2
  random_flip:
    mode: horizontal
  random_rotation:
    factor: 0.1
  random_zoom:
    width_factor: 0.15
    height_factor: 0.15

training:
  frozen_layers: None
  dropout: 0.3
  batch_size: 64
  epochs: 150
  optimizer:
    Adam:
      learning_rate: 0.001
  callbacks:
    ReduceLROnPlateau:
      monitor: val_accuracy
      mode: max
      factor: 0.5
      patience: 8
      min_lr: 1.0e-06
    EarlyStopping:
      monitor: val_accuracy
      mode: max
      restore_best_weights: true
      patience: 20

quantization:
  quantizer: TFlite_converter
  quantization_type: PTQ
  quantization_input_type: uint8
  quantization_output_type: float
  export_dir: quantized_models

mlflow:
  uri: ./tf/src/experiments_outputs/mlruns

hydra:
  run:
    dir: ./tf/src/experiments_outputs/${now:%Y_%m_%d_%H_%M_%S}
